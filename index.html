<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>BPM Tapper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>BPM Tapper</h1>
    <div class="bpm-display">
      <span id="bpm">--</span>
      <span class="bpm-label">BPM</span>
    </div>
    <p class="hint">Tap the button, press <kbd>Space</kbd> or <kbd>Enter</kbd> to the beat</p>
    <div class="tap-wrap">
      <div id="tap-glow"></div>
      <button id="tap-btn">TAP</button>
    </div>
    <button id="reset-btn">Reset (R)</button>

    <div class="tap-stats">
      <div class="stat-block">
        <span class="stat-label">Taps</span>
        <span class="stat-value" id="tap-count">0</span>
        <span class="stat-hint" id="tap-count-hint">need 3+ for result</span>
      </div>
      <div class="stat-block">
        <span class="stat-label">Interval</span>
        <span class="stat-value" id="tap-interval">—</span>
        <span class="stat-hint">ms between taps</span>
      </div>
    </div>

    <div class="confidence-row">
      <span class="stat-label">Confidence</span>
      <div class="confidence-track">
        <div class="confidence-fill" id="confidence-bar"></div>
      </div>
      <span class="confidence-pct" id="confidence-val">—</span>
    </div>

    <div class="divider"></div>

    <canvas id="oscilloscope" width="300" height="56"></canvas>
    <div class="listen-buttons">
      <button id="listen-mic-btn">🎙 Microphone</button>
      <button id="listen-system-btn">💻 System Audio</button>
    </div>
    <p id="listen-status" class="listen-status">Choose how to detect BPM</p>
  </div>
  <div id="version">v0.12.0</div>
  <script src="meyda.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
