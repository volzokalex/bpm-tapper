<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BPM Tapper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>BPM Tapper</h1>
    <div class="bpm-display">
      <span id="bpm">--</span>
      <span class="bpm-label">BPM</span>
    </div>
    <p class="hint">Tap the button, press <kbd>Space</kbd> or <kbd>Enter</kbd> to the beat</p>
    <button id="tap-btn">TAP</button>
    <button id="reset-btn">Reset (R)</button>

    <div class="divider"></div>

    <button id="listen-btn">🎵 Listen to Song</button>
    <p id="listen-status" class="listen-status">Press to detect BPM from microphone</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/meyda/5.6.8/meyda.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
