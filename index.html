<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BPM Tapper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>BPM Tapper</h1>
    <div class="bpm-display">
      <span id="bpm">--</span>
      <span class="bpm-label">BPM</span>
    </div>
    <p class="hint">Tap the button, press <kbd>Space</kbd> or <kbd>Enter</kbd> to the beat</p>
    <div class="tap-wrap">
      <div id="tap-glow"></div>
      <button id="tap-btn">TAP</button>
    </div>
    <button id="reset-btn">Reset (R)</button>

    <div class="divider"></div>

    <canvas id="oscilloscope" width="300" height="56"></canvas>
    <div class="listen-buttons">
      <button id="listen-mic-btn">🎙 Microphone</button>
      <button id="listen-system-btn">💻 System Audio</button>
    </div>
    <p id="listen-status" class="listen-status">Choose how to detect BPM</p>
  </div>
  <div id="version">v0.9</div>
  <script src="meyda.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
